<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocky.io</title>
    <!-- Include Three.js for true, robust 3D rendering -->
    <script src="https://cloudflare.com"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; display: none; background: #1a252f; }
        
        /* HOMEPAGE UI */
        #homepage { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(#2c3e50, #0f171e); z-index: 10; }
        h1 { font-size: 4.5rem; color: #00ffff; margin: 0 0 10px 0; letter-spacing: 4px; text-shadow: 0 0 20px rgba(0,255,255,0.5); }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        label { margin-bottom: 8px; font-size: 1.1rem; color: #b0c4de; font-weight: bold; }
        input { padding: 12px 20px; font-size: 1.2rem; border: 2px solid #00ffff; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; outline: none; text-align: center; }
        
        /* GAMEMODE SELECTION PANEL */
        .gamemode-title { font-size: 1.3rem; color: #ffd700; margin-bottom: 10px; font-weight: bold; }
        .button-group { display: flex; gap: 15px; margin-bottom: 25px; }
        .mode-btn { padding: 12px 25px; font-size: 1.1rem; font-weight: bold; background: #34495e; color: #ecf0f1; border: 2px solid #7f8c8d; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .mode-btn:hover { background: #4e6a85; transform: scale(1.05); }
        .mode-btn.selected { background: #007acc; border-color: #00ffff; box-shadow: 0 0 15px rgba(0,255,255,0.4); }
        
        #play-btn { padding: 15px 50px; font-size: 1.4rem; font-weight: bold; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(39,174,96,0.4); }
        #play-btn:hover { background: #2ecc71; transform: scale(1.05); }
        
        /* LOADING SCREEN */
        #loading-screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: #111; z-index: 9; }
        #loading-text { font-size: 2rem; color: #ffd700; margin-bottom: 15px; }
        #progress-bar-container { width: 300px; height: 20px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #ffd700; }
        #progress-bar { width: 0%; height: 100%; background: #ffd700; }
        
        /* OVERLAY HUD CONTROLS */
        #hud { position: absolute; top: 20px; left: 20px; font-size: 1.1rem; background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 5px; pointer-events: none; display: none; border: 1px solid #00ffff; line-height: 1.5; z-index: 5; }
        .hud-highlight { color: #00ffff; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; font-size: 24px; color: white; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>

    <!-- HOMEPAGE -->
    <div id="homepage">
        <h1>BLOCKY.IO</h1>
        
        <div class="input-group">
            <label for="username">Enter Username:</label>
            <input type="text" id="username" placeholder="ZakirKing123" value="ZakirKing123" maxlength="15">
        </div>

        <div class="gamemode-title">Select Your Gamemode:</div>
        <div class="button-group">
            <button class="mode-btn selected" onclick="selectGamemode('Survival', this)">⚔️ Survival</button>
            <button class="mode-btn" onclick="selectGamemode('Creative', this)">🏗️ Creative</button>
            <button class="mode-btn" onclick="selectGamemode('Peaceful', this)">🌸 Peaceful</button>
        </div>

        <button id="play-btn" onclick="startLoading()">PLAY NOW</button>
    </div>

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div id="loading-text">Loading Blocky.io World... 0%</div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- IN-GAME HUD DISPLAY -->
    <div id="hud">
        <div>Player: <span id="hud-username" class="hud-highlight"></span></div>
        <div>Mode: <span id="hud-mode" class="hud-highlight"></span></div>
        <div style="margin-top: 5px; font-size: 0.9rem; color: #b0c4de;">Click screen to lock mouse cursor. Move mouse to scan around.</div>
    </div>
    <div id="crosshair">+</div>

    <!-- 3D DISPLAY GRAPHICS HOLDER -->
    <div id="canvas-container"></div>

    <script>
        let username = "";
        let selectedGamemode = "Survival";
        
        // Setup engine structural components
        let scene, camera, renderer;
        let angle = 0;

        function selectGamemode(modeName, element) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
            selectedGamemode = modeName;
        }

        function startLoading() {
            username = document.getElementById('username').value.trim() || "ZakirKing123";
            document.getElementById('homepage').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            simulateLoading();
        }

        function simulateLoading() {
            let progress = 0;
            const progressBar = document.getElementById('progress-bar');
            const loadingText = document.getElementById('loading-text');
            
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 8;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(initGame, 200);
                }
                progressBar.style.width = progress + '%';
                loadingText.innerText = `Loading ${selectedGamemode} World... ${progress}%`;
            }, 80);
        }

        // --- AUTHENTIC THREE.JS GRAPHICS INITIALIZATION ---
        function initGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('hud-username').innerText = username;
            document.getElementById('hud-mode').innerText = selectedGamemode;

            // 1. Build Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a252f);
            
            // 2. Build Optics Camera Framework
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // 3. Build Renderer Output Target
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. Inject Dual Ambient and Directional Sun Lighting Map
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            sunLight.position.set(10, 20, 15).normalize();
            scene.add(sunLight);
            
            const softAmbientLight = new THREE.AmbientLight(0x555555);
            scene.add(softAmbientLight);

            // 5. Establish Color Variations Based on Gamemode Selections
            let blockColor = 0x2ecc71; // Survival: Classic Vibrant Green
            let lineOutlineColor = 0x27ae60;

            if (selectedGamemode === "Creative") {
                blockColor = 0x3498db; // Creative: Futuristic Tech Blue
                lineOutlineColor = 0x2980b9;
            } else if (selectedGamemode === "Peaceful") {
                blockColor = 0xe84393; // Peaceful: Dreamy Cherry Blossom Pink
                lineOutlineColor = 0xfd79a8;
            }

            // 6. Spawn Core Mesh Geometry Matrix Array
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshLambertMaterial({ color: blockColor });
            const lineMaterial = new THREE.LineBasicMaterial({ color: lineOutlineColor, linewidth: 2 });
            
            const worldSize = 12;
            for (let x = 0; x < worldSize; x++) {
                for (let z = 0; z < worldSize; z++) {
                    const cubeMesh = new THREE.Mesh(geometry, material);
                    cubeMesh.position.set(x - worldSize/2, 0, z - worldSize/2);
                    
                    // Generate clean, modern block wire outlines
                    const edgesGeometry = new THREE.EdgesGeometry(geometry);
                    const outlines = new THREE.LineSegments(edgesGeometry, lineMaterial);
                    cubeMesh.add(outlines);
                    
                    scene.add(cubeMesh);
                }
            }

            // 7. Establish 1st Person Cinematic Viewing Altitude Angle
            camera.position.set(0, 7, 11);
            camera.lookAt(0, 0, 0);

            // Listen for window scale adaptions
            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
// 8. Infinite Graphics Pipeline Processing Loopfunction animate() {requestAnimationFrame(animate);// Apply constant, smooth orbit sweep logic to give a rich background tracking vibeangle += 0.004;camera.position.x = 11 * Math.sin(angle);camera.position.z = 11 * Math.cos(angle);camera.lookAt(0, 0, 0);renderer.render(scene, camera);}
