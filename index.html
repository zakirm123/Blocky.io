<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocky.io</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; user-select: none; }
        #game-canvas { width: 100vw; height: 100vh; display: none; background: #1a252f; }
        
        /* HOMEPAGE */
        #homepage { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(#2c3e50, #0f171e); z-index: 10; }
        h1 { font-size: 4.5rem; color: #00ffff; margin: 0 0 10px 0; letter-spacing: 4px; text-shadow: 0 0 20px rgba(0,255,255,0.5); }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        label { margin-bottom: 8px; font-size: 1.1rem; color: #b0c4de; font-weight: bold; }
        input { padding: 12px 20px; font-size: 1.2rem; border: 2px solid #00ffff; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; outline: none; text-align: center; }
        
        /* GAMEMODE SELECTION PATTERNS */
        .gamemode-title { font-size: 1.3rem; color: #ffd700; margin-bottom: 10px; font-weight: bold; }
        .button-group { display: flex; gap: 15px; margin-bottom: 25px; }
        .mode-btn { padding: 12px 25px; font-size: 1.1rem; font-weight: bold; background: #34495e; color: #ecf0f1; border: 2px solid #7f8c8d; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .mode-btn:hover { background: #4e6a85; transform: scale(1.05); }
        .mode-btn.selected { background: #007acc; border-color: #00ffff; box-shadow: 0 0 15px rgba(0,255,255,0.4); }
        
        #play-btn { padding: 15px 50px; font-size: 1.4rem; font-weight: bold; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(39,174,96,0.4); }
        #play-btn:hover { background: #2ecc71; transform: scale(1.05); }
        
        /* LOADING SCREEN */
        #loading-screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: #111; z-index: 9; }
        #loading-text { font-size: 2rem; color: #ffd700; margin-bottom: 15px; }
        #progress-bar-container { width: 300px; height: 20px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #ffd700; }
        #progress-bar { width: 0%; height: 100%; background: #ffd700; }
        
        /* IN-GAME HUD */
        #hud { position: absolute; top: 20px; left: 20px; font-size: 1.1rem; background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 5px; pointer-events: none; display: none; border: 1px solid #00ffff; line-height: 1.5; }
        .hud-highlight { color: #00ffff; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; display: none; font-size: 20px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <!-- HOMEPAGE -->
    <div id="homepage">
        <h1>BLOCKY.IO</h1>
        
        <div class="input-group">
            <label for="username">Enter Username:</label>
            <input type="text" id="username" placeholder="ZakirKing123" maxlength="15">
        </div>

        <div class="gamemode-title">Select Your Gamemode:</div>
        <div class="button-group">
            <button class="mode-btn selected" onclick="selectMode('Survival', this)">⚔️ Survival</button>
            <button class="mode-btn" onclick="selectMode('Creative', this)">🏗️ Creative</button>
            <button class="mode-btn" onclick="selectMode('Peaceful', this)">🌸 Peaceful</button>
        </div>

        <button id="play-btn" onclick="startLoading()">PLAY NOW</button>
    </div>

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div id="loading-text">Loading Blocky.io World... 0%</div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- IN-GAME HUD & CROSSHAIR -->
    <div id="hud">
        <div>Player: <span id="hud-username" class="hud-highlight"></span></div>
        <div>Mode: <span id="hud-mode" class="hud-highlight"></span></div>
        <div style="margin-top: 5px; font-size: 0.9rem; color: #b0c4de;">Click screen to lock mouse. WASD to move look around.</div>
    </div>
    <div id="crosshair">+</div>

    <canvas id="game-canvas"></canvas>

    <script>
        let username = "";
        let selectedGamemode = "Survival";
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // 1st Person Movement Engine Tracking variables
        let playerPos = { x: 0, y: 1.5, z: 0 };
        let playerRot = { yaw: 0, pitch: 0 }; // Looking tracking variables
        let keys = {};

        function selectMode(modeName, element) {
            // Remove selection class from all mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            // Highlight the one clicked
            element.classList.add('selected');
            selectedGamemode = modeName;
        }

        function startLoading() {
            username = document.getElementById('username').value.trim() || "ZakirKing123";
            document.getElementById('homepage').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            simulateLoading();
        }

        function simulateLoading() {
            let progress = 0;
            const progressBar = document.getElementById('progress-bar');
            const loadingText = document.getElementById('loading-text');
            
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 8;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(initGame, 200);
                }
                progressBar.style.width = progress + '%';
                loadingText.innerText = `Loading ${selectedGamemode} World... ${progress}%`;
            }, 80);
        }

        function initGame() {
            document.getElementById('loading-screen').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('hud-username').innerText = username;
            document.getElementById('hud-mode').innerText = selectedGamemode;

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Set up pointer lock for real 1st Person Mouse Movement
            canvas.addEventListener('click', () => {
                canvas.requestPointerLock();
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === canvas) {
                    playerRot.yaw -= e.movementX * 0.003;
                    playerRot.pitch -= e.movementY * 0.003;
                    // Cap looking up and down limits
                    playerRot.pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, playerRot.pitch));
                }
            });

            // Track movement keys
            window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            animate();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // High Performance 1st Person 3D Matrix Projection Engine
        function render3DWorld() {
            let gridSize = 14;
            let blockSize = 40;
            let cosY = Math.cos(playerRot.yaw);
            let sinY = Math.sin(playerRot.yaw);

            // Determine block color patterns based on selected gamemode
            let topColor = "#2ecc71"; // Default Grass
            let sideColor1 = "#27ae60";
            let sideColor2 = "#1e824c";

            if (selectedGamemode === "Creative") {
                topColor = "#3498db"; // Sky blocks theme
                sideColor1 = "#2980b9";
                sideColor2 = "#1f3a60";
            } else if (selectedGamemode === "Peaceful") {
                topColor = "#e84393"; // Pink cherry flower theme
                sideColor1 = "#fd79a8";
                sideColor2 = "#a22b5f";
            }

            // Simple loop matrix tracking block locations relative to the 1st person viewer
            for (let x = -gridSize/2; x < gridSize/2; x++) {
                for (let z = -gridSize/2; z < gridSize/2; z++) {
                    
                    // Translate world blocks relative to player position
                    let dx = x * 1.5 - playerPos.x;
                    let dz = z * 1.5 - playerPos.z;
                    let dy = -playerPos.y;

                    // Rotate coordinates around player's eye yaw angle
                    let rotX = dx * cosY - dz * sinY;
                    let rotZ = dx * sinY + dz * cosY;

                    // If blocks are sitting behind camera view vector, don't waste power rendering them
                    if (rotZ <= 0.5) continue;

                    // Project coordinates onto the 2D window viewport surface
                    let fovFactor = 400 / rotZ;
                    let screenX = rotX * fovFactor + (canvas.width / 2);
                    let screenY = dy * fovFactor + (canvas.height / 2) + (playerRot.pitch * 300);
let size = blockSize * (fovFactor / 100);// Render Block Top Facesctx.fillStyle = topColor;ctx.beginPath();ctx.moveTo(screenX, screenY - size);ctx.lineTo(screenX + size, screenY - size * 0.5);ctx.lineTo(screenX, screenY);ctx.lineTo(screenX - size, screenY - size * 0.5);ctx.closePath();ctx.fill();// Render Left side profile panel meshctx.fillStyle = sideColor1;ctx.beginPath();ctx.moveTo(screenX - size, screenY - size * 0.5);ctx.lineTo(screenX, screenY);ctx.lineTo(screenX, screenY + size);ctx.lineTo(screenX - size, screenY + size * 0.5);ctx.closePath();ctx.fill();// Render Right side profile panel meshctx.fillStyle = sideColor2;ctx.beginPath();ctx.moveTo(screenX, screenY);ctx.lineTo(screenX + size, screenY - size * 0.5);ctx.lineTo(screenX + size, screenY + size * 0.5);ctx.lineTo(screenX, screenY + size);ctx.closePath();ctx.fill();}}}function updateMovement() {if (document.pointerLockElement !== canvas) return;let speed = 0.05;let cosY = Math.cos(playerRot.yaw);let sinY = Math.sin(playerRot.yaw);// True first-person direction relative controller calculationsif (keys['w']) {playerPos.x += sinY * speed;playerPos.z += cosY * speed;}if (keys['s']) {playerPos.x -= sinY * speed;playerPos.z -= cosY * speed;}if (keys['a']) {playerPos.x -= cosY * speed;playerPos.z += sinY * speed;}if (keys['d']) {playerPos.x += cosY * speed;playerPos.z -= sinY * speed;}}function animate() {ctx.clearRect(0, 0, canvas.width, canvas.height);updateMovement();render3DWorld();requestAnimationFrame(animate);}
